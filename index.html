<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cat of the Day</title>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
body{
  margin:0;
  padding:16px;
  background:#fff;
  color:#000;
  font-family:Verdana,Arial,sans-serif;
  font-size:13px;
  display:flex;
  justify-content:center;
}
.wrap{
  width:420px;
  max-width:100%;
}
h1{
  font-size:18px;
  margin:0 0 8px;
  text-align:center;
}
h2{
  font-size:14px;
  margin:10px 0 5px;
  border-bottom:1px solid #000;
}
table{
  border-collapse:collapse;
  width:100%;
  margin:6px 0;
}
td,th{
  border:1px solid #999;
  padding:5px;
  vertical-align:top;
}
button,input,select,textarea{
  font-family:Verdana,Arial,sans-serif;
  font-size:12px;
}
button{
  padding:4px 8px;
  margin:2px;
}
.nav{
  text-align:center;
  margin:8px 0;
}
.nav button{
  width:30%;
}
.page{
  display:none;
}
.page.on{
  display:block;
}
.imgbox{
  width:220px;
  height:220px;
  margin:0 auto;
  background:#ddd;
  border:1px solid #999;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
}
.imgbox img{
  max-width:220px;
  max-height:220px;
  display:block;
}
.catimg{
  width:58px;
  height:58px;
  object-fit:contain;
  background:#ddd;
  border:1px solid #999;
}
.tiny{
  font-size:11px;
  color:#333;
}
.link{
  color:#00e;
  text-decoration:underline;
  cursor:pointer;
}
.badge{
  border:1px solid #000;
  padding:1px 5px;
  font-size:11px;
}
.box{
  border:1px solid #999;
  background:#eee;
  padding:6px;
  margin:6px 0;
}
.full{
  width:96%;
}
.row{
  margin:6px 0;
}
.dead{
  color:#777;
  text-decoration:line-through;
}
@keyframes flick{
  0%{opacity:1}
  50%{opacity:.45}
  100%{opacity:1}
}
.flicker{
  animation:flick .12s steps(1,end) infinite;
}
@keyframes flashit{
  0%{background:#ff9}
  100%{background:transparent}
}
.flash{
  animation:flashit .6s steps(3,end);
}
</style>
</head>
<body>
<div class="wrap">
<h1>Cat of the Day <span id="userTag"></span></h1>

<div id="gate" class="page on">
<h2>Name</h2>
<table>
<tr><td><input id="nameInput" maxlength="12" class="full"></td></tr>
<tr><td><button id="setName">Start</button></td></tr>
</table>
<div id="gateMsg" class="row"></div>
</div>

<div id="app" style="display:none">
<div class="nav">
<button data-page="home">Cat</button>
<button data-page="cats">Cats</button>
<button data-page="trade">Trade</button>
</div>

<div id="home" class="page">
<div id="today" class="imgbox">No cat</div>
<div class="row" style="text-align:center">
<button id="grab">Grab</button>
</div>
<table>
<tr><td>Cats</td><td id="owned">0</td></tr>
<tr><td>Ração</td><td id="currency">0</td></tr>
<tr><td>Streak</td><td id="streak">0</td></tr>
</table>
<div id="status" class="box">Ready</div>
</div>

<div id="cats" class="page">
<h2>Cats</h2>
<table id="catTable">
<tr><td>None</td></tr>
</table>
<div class="row"><span id="deleteAll" class="link">Reset</span></div>
</div>

<div id="trade" class="page">
<h2>Trade</h2>
<div class="box">
<div class="row">Offer</div>
<div id="offerPicker"></div>
<div class="row">Ração <input id="offerCurrency" type="number" min="0" value="0" style="width:70px"> <span class="link" data-act="maxCurrency" data-target="offerCurrency">max</span></div>
<button id="makeTrade">Make link</button>
<div id="tradeMsg" class="row"></div>
</div>

<div id="liveRoom"></div>

<details>
<summary>Links</summary>
<div id="myLinks">None</div>
</details>

<details>
<summary>Joined</summary>
<div id="joinedLinks">None</div>
</details>
</div>
</div>
</div>

<script>
(() => {
const te=new TextEncoder()
const td=new TextDecoder()
const APP="catday-simple-static-v1"
const SAVE="catday_simple_save_v1"
const rarities=[["Common",550000],["Uncommon",250000],["Rare",120000],["Epic",50000],["Legendary",20000],["Mythic",8500],["Mastery",1500]]
let state=freshState()
let gun=null
let root=null
let watches={}
let room=null
try{
  if(window.Gun){
    gun=Gun({peers:["https://gun-manhattan.herokuapp.com/gun","https://gunjs.herokuapp.com/gun","https://relay.peer.ooo/gun"]})
    root=gun.get(APP)
  }
}catch(e){}

function freshState(){
  return{username:"",sid:rid(12),racao:0,cats:[],grabs:[],lastDate:"",todayCat:null,createdTrades:[],joinedTrades:[],doneTrades:[]}
}
function q(x){return document.querySelector(x)}
function esc(x){return String(x||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function msg(x){q("#status").textContent=x}
function tmsg(x){q("#tradeMsg").textContent=x}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function todayKey(d=new Date()){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function base(){return location.href.split("#")[0]}
function cleanUser(x){return String(x||"").replace(/[^a-z]/gi,"").slice(0,12)}
function cleanCatName(x){return String(x||"").replace(/[\r\n\t]/g," ").replace(/\s+/g," ").slice(0,24)}
function rid(n){let a="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789",s="";for(let i=0;i<n;i++)s+=a[Math.floor(Math.random()*a.length)];return s}
function safeNum(n){n=parseInt(n);if(!Number.isFinite(n)||n<0)n=0;return Math.min(n,999999)}
function bytesTo64(buf){let a=buf instanceof Uint8Array?buf:new Uint8Array(buf),s="";for(let i=0;i<a.length;i+=32768)s+=String.fromCharCode(...a.subarray(i,i+32768));return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"")}
function bytesFrom64(s){s=String(s||"").replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";let b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
function newKey(){let a=new Uint8Array(16);crypto.getRandomValues(a);return bytesTo64(a)}
async function aes(k){return crypto.subtle.importKey("raw",bytesFrom64(k),"AES-GCM",false,["encrypt","decrypt"])}
async function lock(k,o){let iv=new Uint8Array(12);crypto.getRandomValues(iv);let key=await aes(k);let enc=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,te.encode(JSON.stringify(o)));return bytesTo64(iv)+"."+bytesTo64(enc)}
async function unlock(k,s){try{let p=String(s||"").split(".");if(p.length!==2)return null;let key=await aes(k);let dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:bytesFrom64(p[0])},key,bytesFrom64(p[1]));return JSON.parse(td.decode(dec))}catch(e){return null}}
async function shaBytes(buf){let h=await crypto.subtle.digest("SHA-256",buf);return[...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("")}
async function shaText(s){return shaBytes(te.encode(s))}
function rarityFromHash(h){let n=parseInt(h.slice(0,12),16)%1000000,total=0;for(let r of rarities){total+=r[1];if(n<total)return r[0]}return"Common"}
function setCookie(n,v,days){let d=new Date();d.setTime(d.getTime()+days*86400000);document.cookie=n+"="+encodeURIComponent(v)+";expires="+d.toUTCString()+";path=/;SameSite=Lax"}
function getCookie(n){let a=document.cookie.split(";");for(let c of a){c=c.trim();if(c.indexOf(n+"=")===0)return decodeURIComponent(c.slice(n.length+1))}return""}
function delCookie(n){document.cookie=n+"=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;SameSite=Lax"}
function saveChunks(name,val){for(let i=0;i<60;i++)delCookie(name+"_"+i);let size=3000,chunks=[];for(let i=0;i<val.length;i+=size)chunks.push(val.slice(i,i+size));setCookie(name+"_count",String(chunks.length),365);for(let i=0;i<chunks.length;i++)setCookie(name+"_"+i,chunks[i],365)}
function readChunks(name){let n=parseInt(getCookie(name+"_count"));if(!Number.isFinite(n)||n<1)return"";let s="";for(let i=0;i<n;i++){let p=getCookie(name+"_"+i);if(!p)return"";s+=p}return s}
function saveLocal(v){try{localStorage.setItem(SAVE,v)}catch(e){}}
function readLocal(){try{return localStorage.getItem(SAVE)||""}catch(e){return""}}
function saveProfile(){let v=bytesTo64(te.encode(JSON.stringify(state)));saveChunks(SAVE,v);saveLocal(v)}
function loadProfile(){let v=readChunks(SAVE)||readLocal();if(!v)return null;try{return JSON.parse(td.decode(bytesFrom64(v)))}catch(e){return null}}
function cleanCat(c){
  return{
    id:String((c&&c.id)||"").slice(0,100),
    hash:String((c&&c.hash)||"").slice(0,80),
    rarity:rarities.some(r=>r[0]===(c&&c.rarity))?c.rarity:"Common",
    breed:String((c&&c.breed)||"").slice(0,60),
    api:String((c&&c.api)||"").slice(0,30),
    url:String((c&&c.url)||"").slice(0,500),
    got:String((c&&c.got)||todayKey()).slice(0,12),
    name:cleanCatName((c&&c.name)||""),
    trade:!!(c&&c.trade)
  }
}
function cleanTradeMini(x){
  return{
    id:String((x&&x.id)||"").replace(/[^a-zA-Z0-9]/g,"").slice(0,12),
    k:String((x&&x.k)||"").replace(/[^a-zA-Z0-9_-]/g,"").slice(0,40),
    link:String((x&&x.link)||"").slice(0,500),
    short:String((x&&x.short)||"").slice(0,500),
    status:String((x&&x.status)||"open").slice(0,30),
    made:safeNum((x&&x.made)||Date.now()),
    offerHashes:Array.isArray(x&&x.offerHashes)?x.offerHashes.map(h=>String(h).slice(0,80)).slice(0,12):[],
    offerCurrency:safeNum(x&&x.offerCurrency),
    proposalHashes:Array.isArray(x&&x.proposalHashes)?x.proposalHashes.map(h=>String(h).slice(0,80)).slice(0,12):[],
    proposalCurrency:safeNum(x&&x.proposalCurrency)
  }
}
function normalizeState(s){
  let n=freshState()
  if(!s||typeof s!=="object")return n
  n.username=cleanUser(s.username)
  n.sid=String(s.sid||rid(12)).slice(0,30)
  n.racao=safeNum(s.racao)
  n.cats=Array.isArray(s.cats)?s.cats.map(cleanCat).filter(c=>c.hash).slice(0,120):[]
  n.grabs=Array.isArray(s.grabs)?s.grabs.map(x=>String(x).slice(0,12)).slice(-120):[]
  n.lastDate=String(s.lastDate||"").slice(0,12)
  n.todayCat=s.todayCat?cleanCat(s.todayCat):null
  n.createdTrades=Array.isArray(s.createdTrades)?s.createdTrades.map(cleanTradeMini).filter(x=>x.id&&x.k).slice(-50):[]
  n.joinedTrades=Array.isArray(s.joinedTrades)?s.joinedTrades.map(cleanTradeMini).filter(x=>x.id&&x.k).slice(-50):[]
  n.doneTrades=Array.isArray(s.doneTrades)?s.doneTrades.map(x=>String(x).slice(0,80)).slice(-200):[]
  return n
}
async function hashImage(url,id){
  try{
    let r=await fetch(url,{cache:"no-store",mode:"cors"})
    if(!r.ok)throw 0
    return await shaBytes(await r.arrayBuffer())
  }catch(e){
    return await shaText("fallback:"+id+":"+String(url).split("?")[0])
  }
}
async function fact(){
  try{
    let r=await fetch("https://catfact.ninja/fact",{cache:"no-store"})
    let j=await r.json()
    return j.fact||""
  }catch(e){
    return""
  }
}
async function makeCat(b){
  let imgHash=await hashImage(b.url,b.id)
  let h=await shaText("cat-rarity-v4|"+b.id+"|"+b.url.split("?")[0]+"|"+imgHash)
  return{id:b.id,api:b.api,url:b.url,hash:h,rarity:rarityFromHash(h),breed:b.breed||"",fact:b.fact||"",got:todayKey(),name:"",trade:false}
}
async function theCatApi(){
  let r=await fetch("https://api.thecatapi.com/v1/images/search?limit=1&has_breeds=1&mime_types=jpg,png,gif&size=med",{cache:"no-store"})
  let j=await r.json()
  if(!j||!j[0]||!j[0].url)throw 0
  let x=j[0]
  return makeCat({id:"thecatapi:"+x.id,api:"TheCatAPI",url:x.url,breed:x.breeds&&x.breeds[0]?x.breeds[0].name:"",fact:await fact()})
}
async function cataas(){
  let r=await fetch("https://cataas.com/cat?json=true",{cache:"no-store"})
  let j=await r.json()
  let id=j._id||j.id||j.file||String(Date.now())
  let url=j.url?(j.url.startsWith("http")?j.url:"https://cataas.com"+j.url):"https://cataas.com/cat/"+id
  return makeCat({id:"cataas:"+id,api:"Cataas",url:url,breed:"",fact:await fact()})
}
async function getCat(){
  try{return await theCatApi()}catch(e){return await cataas()}
}
function addCat(c){
  c=cleanCat(c)
  if(!c.hash)return false
  if(state.cats.some(x=>x.hash===c.hash))return false
  state.cats.unshift(c)
  return true
}
function removeCat(h){
  let n=state.cats.length
  state.cats=state.cats.filter(c=>c.hash!==h)
  return state.cats.length!==n
}
function findCat(h){return state.cats.find(c=>c.hash===h)}
function copyCat(c){return cleanCat(c)}
function streak(){
  let set=new Set(state.grabs),d=new Date(),n=0
  while(set.has(todayKey(d))){n++;d.setDate(d.getDate()-1)}
  return n
}
function catName(c){return esc(c.name||c.breed||"cat")}
function catLine(c){
  return"<tr><td style=\"width:68px\"><img class=\"catimg\" src=\""+esc(c.url)+"\" alt=\"cat\"></td><td><b>"+catName(c)+"</b><br><span class=\"badge\">"+esc(c.rarity)+"</span><br><span class=\"tiny\">"+esc(c.breed||"mystery")+" · "+esc(c.hash.slice(0,6))+"</span></td></tr>"
}
function catMini(c){
  return"<table><tr><td style=\"width:68px\"><img class=\"catimg\" src=\""+esc(c.url)+"\" alt=\"cat\"></td><td><b>"+catName(c)+"</b><br><span class=\"badge\">"+esc(c.rarity)+"</span><br><span class=\"tiny\">"+esc(c.hash.slice(0,6))+"</span></td></tr></table>"
}
function catsText(cats){
  if(!cats||!cats.length)return"None"
  return cats.map(catMini).join("")
}
function selected(name){
  return[...document.querySelectorAll("input[name='"+name+"']:checked")].map(x=>x.value)
}
function selectedCats(name){
  return selected(name).map(findCat).filter(Boolean)
}
function pickerHtml(name){
  if(!state.cats.length)return"<div>None</div>"
  return"<table>"+state.cats.map(c=>"<tr><td style=\"width:25px\"><input type=\"checkbox\" name=\""+esc(name)+"\" value=\""+esc(c.hash)+"\"></td><td style=\"width:68px\"><img class=\"catimg\" src=\""+esc(c.url)+"\" alt=\"cat\"></td><td><b>"+catName(c)+"</b><br><span class=\"badge\">"+esc(c.rarity)+"</span></td></tr>").join("")+"</table>"
}
function capCurrency(id){
  let x=q("#"+id)
  if(!x)return 0
  let v=safeNum(x.value)
  if(v>state.racao)v=state.racao
  x.value=v
  return v
}
function render(){
  q("#owned").textContent=state.cats.length
  q("#currency").textContent=state.racao
  q("#streak").textContent=streak()
  q("#grab").disabled=state.lastDate===todayKey()
  q("#userTag").textContent=state.username?"["+state.username+"]":""
  q("#catTable").innerHTML=state.cats.length?state.cats.map(collectionRow).join(""):"<tr><td>None</td></tr>"
  if(state.todayCat&&state.lastDate===todayKey())q("#today").innerHTML="<img src=\""+esc(state.todayCat.url)+"\" alt=\"cat\">"
  else q("#today").innerHTML="No cat"
  if(q("#trade").classList.contains("on"))renderTrade()
}
function collectionRow(c){
  return"<tr><td style=\"width:68px\"><img class=\"catimg\" src=\""+esc(c.url)+"\" alt=\"cat\"></td><td><input data-act=\"rename\" data-h=\""+esc(c.hash)+"\" value=\""+esc(c.name||"")+"\" maxlength=\"24\" class=\"full\"><br><span class=\"badge\">"+esc(c.rarity)+"</span><br><span class=\"tiny\">"+esc(c.breed||"mystery")+" · "+esc(c.got||"")+"</span><br><span class=\"link\" data-act=\"delete\" data-h=\""+esc(c.hash)+"\">delete</span></td></tr>"
}
async function grab(){
  if(state.lastDate===todayKey()){msg("Already grabbed");return}
  q("#grab").disabled=true
  let box=q("#today")
  box.classList.add("flicker")
  let catPromise=getCat()
  let names=rarities.map(r=>r[0])
  for(let i=0;i<22;i++){
    box.innerHTML="<b>"+names[Math.floor(Math.random()*names.length)]+"</b>"
    await wait(35+i*6)
  }
  try{
    let c=await catPromise
    box.classList.remove("flicker")
    state.lastDate=todayKey()
    state.todayCat=c
    if(!state.grabs.includes(todayKey()))state.grabs.push(todayKey())
    addCat(c)
    state.racao+=500
    saveProfile()
    box.classList.add("flash")
    setTimeout(()=>box.classList.remove("flash"),650)
    msg(c.rarity+" cat. +500 Ração")
    render()
  }catch(e){
    box.classList.remove("flicker")
    msg("Try again")
    q("#grab").disabled=false
    render()
  }
}
function liveNode(id){
  if(!root)return null
  return root.get(id)
}
function livePut(id,field,val){
  let n=liveNode(id)
  if(!n)return false
  n.get(field).put(val)
  return true
}
function watchField(id,k,field,fn){
  if(!root)return
  if(!watches[id])watches[id]={}
  if(watches[id][field])return
  let node=liveNode(id).get(field)
  let last=""
  watches[id][field]=node
  node.on(async v=>{
    if(typeof v!=="string"||!v||v===last)return
    last=v
    let o=await unlock(k,v)
    if(o)fn(o)
  })
}
function startWatch(id,k){
  if(!root)return
  watchField(id,k,"offer",o=>{if(room&&room.id===id){room.offer=o;renderRoom()}})
  watchField(id,k,"join",o=>{
    let mine=state.createdTrades.some(t=>t.id===id)
    if(mine&&o.sid!==state.sid){
      let tr=state.createdTrades.find(t=>t.id===id)
      if(tr)tr.status="joined"
      saveProfile()
      openRoom(id,k,false)
      tmsg(o.username+" joined")
    }
  })
  watchField(id,k,"proposal",o=>{
    let mine=state.createdTrades.some(t=>t.id===id)
    if(mine){
      let tr=state.createdTrades.find(t=>t.id===id)
      if(tr){
        tr.status="proposal"
        tr.proposalHashes=(o.cats||[]).map(c=>c.hash)
        tr.proposalCurrency=safeNum(o.currency)
      }
      saveProfile()
      if(room&&room.id===id){room.proposal=o;renderRoom()}else openRoom(id,k,false)
      tmsg("Proposal")
    }
  })
  watchField(id,k,"accepted",o=>handleAccepted(id,k,o))
  watchField(id,k,"declined",o=>{
    if(o.toSid===state.sid||o.toUser===state.username){
      let tr=state.joinedTrades.find(t=>t.id===id)
      if(tr)tr.status="declined"
      saveProfile()
      if(room&&room.id===id){room.declined=o;renderRoom()}
      tmsg("Declined")
    }
  })
  watchField(id,k,"cancelled",o=>{
    let tr=state.createdTrades.find(t=>t.id===id)||state.joinedTrades.find(t=>t.id===id)
    if(tr)tr.status="cancelled"
    saveProfile()
    if(room&&room.id===id){room.cancelled=o;renderRoom()}
    tmsg("Cancelled")
  })
}
async function loadLive(id,k,field){
  return new Promise(resolve=>{
    if(!root){resolve(null);return}
    let done=false
    let node=liveNode(id).get(field)
    let timer=setTimeout(()=>{if(!done){done=true;resolve(null)}},1800)
    node.once(async v=>{
      if(done)return
      done=true
      clearTimeout(timer)
      if(typeof v!=="string"){resolve(null);return}
      resolve(await unlock(k,v))
    })
  })
}
async function shortLink(long){
  let apis=["https://is.gd/create.php?format=simple&url="+encodeURIComponent(long)]
  for(let u of apis){
    try{
      let r=await fetch(u,{cache:"no-store"})
      let tx=(await r.text()).trim()
      if(r.ok&&/^https?:\/\//i.test(tx)&&tx.length<120)return tx
    }catch(e){}
  }
  return long
}
function copyText(x){
  try{navigator.clipboard.writeText(x)}catch(e){
    let ta=document.createElement("textarea")
    ta.value=x
    document.body.appendChild(ta)
    ta.select()
    document.execCommand("copy")
    ta.remove()
  }
}
async function createTrade(){
  if(!root){tmsg("Live failed");return}
  let picks=selected("offerPick")
  if(!picks.length){tmsg("Pick a cat");return}
  let cats=picks.map(findCat).filter(Boolean).slice(0,12).map(copyCat)
  let cur=capCurrency("offerCurrency")
  let id=rid(5)
  let k=newKey()
  let long=base()+"#t="+id+"."+k
  let rec={id,k,link:long,short:"",status:"open",made:Date.now(),offerHashes:cats.map(c=>c.hash),offerCurrency:cur,proposalHashes:[],proposalCurrency:0}
  state.createdTrades.unshift(rec)
  state.createdTrades=state.createdTrades.slice(0,50)
  saveProfile()
  startWatch(id,k)
  let offer={type:"offer",id,username:state.username,sid:state.sid,cats,currency:cur,t:Date.now()}
  livePut(id,"offer",await lock(k,offer))
  room={id,k,offer,proposal:null,cancelled:null,declined:null,accepted:null,visitor:false}
  renderTrade()
  tmsg("Making link")
  let s=await shortLink(long)
  rec.short=s
  saveProfile()
  copyText(s)
  renderTrade()
  tmsg("Copied")
}
function catsByHashes(hashes){
  return(hashes||[]).map(findCat).filter(Boolean)
}
function renderTrade(){
  q("#offerPicker").innerHTML=pickerHtml("offerPick")
  renderMyLinks()
  renderJoinedLinks()
  if(room)renderRoom()
}
function renderMyLinks(){
  if(!state.createdTrades.length){q("#myLinks").innerHTML="None";return}
  q("#myLinks").innerHTML=state.createdTrades.map(t=>"<div class=\"box\"><span class=\"badge\">"+esc(t.status)+"</span> "+esc(t.id)+"<br><input class=\"full\" readonly value=\""+esc(t.short||t.link)+"\"><br><span class=\"link\" data-act=\"copyTrade\" data-id=\""+esc(t.id)+"\">copy</span> · <span class=\"link\" data-act=\"openTrade\" data-id=\""+esc(t.id)+"\">open</span> · <span class=\"link\" data-act=\"cancelTrade\" data-id=\""+esc(t.id)+"\">cancel</span><br><span class=\"tiny\">"+safeNum(t.offerCurrency)+" Ração</span></div>").join("")
}
function renderJoinedLinks(){
  if(!state.joinedTrades.length){q("#joinedLinks").innerHTML="None";return}
  q("#joinedLinks").innerHTML=state.joinedTrades.map(t=>"<div class=\"box\"><span class=\"badge\">"+esc(t.status)+"</span> "+esc(t.id)+"<br><span class=\"link\" data-act=\"openJoined\" data-id=\""+esc(t.id)+"\">open</span><br><span class=\"tiny\">"+safeNum(t.proposalCurrency)+" Ração</span></div>").join("")
}
async function openFromHash(){
  let h=location.hash.slice(1)
  if(!h)return
  let s=""
  if(h.indexOf("t=")===0)s=h.slice(2)
  if(h.indexOf("trade=")===0)s=h.slice(6)
  if(!s||s.indexOf(".")<0)return
  let p=s.split(".")
  let id=p[0].replace(/[^a-zA-Z0-9]/g,"").slice(0,12)
  let k=p[1].replace(/[^a-zA-Z0-9_-]/g,"").slice(0,40)
  if(id&&k)await openRoom(id,k,true)
}
async function openRoom(id,k,sendJoin){
  if(!root){tmsg("Live failed");return}
  startWatch(id,k)
  room={id,k,offer:null,proposal:null,cancelled:null,declined:null,accepted:null,visitor:sendJoin}
  goPage("trade")
  q("#liveRoom").innerHTML="<h2>Room</h2><div class=\"box\">Loading</div>"
  let offer=await loadLive(id,k,"offer")
  if(offer)room.offer=offer
  let proposal=await loadLive(id,k,"proposal")
  if(proposal)room.proposal=proposal
  let accepted=await loadLive(id,k,"accepted")
  if(accepted)room.accepted=accepted
  let cancelled=await loadLive(id,k,"cancelled")
  if(cancelled)room.cancelled=cancelled
  if(sendJoin){
    let exists=state.joinedTrades.some(t=>t.id===id)
    if(!exists&&!state.createdTrades.some(t=>t.id===id)){
      state.joinedTrades.unshift({id,k,link:base()+"#t="+id+"."+k,short:"",status:"viewing",made:Date.now(),offerHashes:[],offerCurrency:0,proposalHashes:[],proposalCurrency:0})
      state.joinedTrades=state.joinedTrades.slice(0,50)
      saveProfile()
    }
    livePut(id,"join",await lock(k,{type:"join",id,username:state.username,sid:state.sid,t:Date.now(),n:rid(4)}))
  }
  renderRoom()
  renderTrade()
}
function isCreator(){
  return room&&state.createdTrades.some(t=>t.id===room.id)
}
function isMineOffer(){
  return room&&room.offer&&room.offer.sid===state.sid
}
function currencyInput(id,val){
  return"<input id=\""+esc(id)+"\" type=\"number\" min=\"0\" value=\""+safeNum(val)+"\" style=\"width:70px\"> <span class=\"link\" data-act=\"maxCurrency\" data-target=\""+esc(id)+"\">max</span>"
}
function renderRoom(){
  if(!room){q("#liveRoom").innerHTML="";return}
  let h="<h2>Room "+esc(room.id)+"</h2>"
  if(room.cancelled)h+="<div class=\"box\">Cancelled</div>"
  if(room.declined)h+="<div class=\"box\">Declined</div>"
  if(room.accepted)h+="<div class=\"box\">Accepted</div>"
  if(!room.offer)h+="<div class=\"box\">No offer</div>"
  else h+="<table><tr><td>From</td><td>"+esc(room.offer.username)+"</td></tr><tr><td>Gives</td><td>"+catsText(room.offer.cats)+"</td></tr><tr><td>Ração</td><td>"+safeNum(room.offer.currency)+"</td></tr></table>"
  if(room.offer&&!isMineOffer()&&!room.accepted&&!room.cancelled){
    h+="<div class=\"box\"><b>Your offer</b><div id=\"replyPicker\">"+pickerHtml("replyPick")+"</div><div class=\"row\">Ração "+currencyInput("replyCurrency",0)+"</div><button data-act=\"sendProposal\">Send</button></div>"
  }
  if(room.proposal){
    h+="<h2>Proposal</h2><table><tr><td>From</td><td>"+esc(room.proposal.username)+"</td></tr><tr><td>Gives</td><td>"+catsText(room.proposal.cats)+"</td></tr><tr><td>Ração</td><td>"+safeNum(room.proposal.currency)+"</td></tr></table>"
    if(isCreator()&&!room.accepted&&!room.cancelled)h+="<button data-act=\"acceptProposal\">Accept</button><button data-act=\"declineProposal\">No</button>"
  }
  q("#liveRoom").innerHTML=h
}
async function sendProposal(){
  if(!room||!room.offer){tmsg("No room");return}
  let picks=selected("replyPick")
  if(!picks.length){tmsg("Pick a cat");return}
  let cats=picks.map(findCat).filter(Boolean).slice(0,12).map(copyCat)
  let cur=capCurrency("replyCurrency")
  let prop={type:"proposal",id:room.id,username:state.username,sid:state.sid,cats,currency:cur,t:Date.now()}
  livePut(room.id,"proposal",await lock(room.k,prop))
  let tr=state.joinedTrades.find(t=>t.id===room.id)
  if(!tr){
    tr={id:room.id,k:room.k,link:base()+"#t="+room.id+"."+room.k,short:"",status:"waiting",made:Date.now(),offerHashes:[],offerCurrency:0,proposalHashes:[],proposalCurrency:0}
    state.joinedTrades.unshift(tr)
  }
  tr.status="waiting"
  tr.proposalHashes=cats.map(c=>c.hash)
  tr.proposalCurrency=cur
  saveProfile()
  room.proposal=prop
  renderRoom()
  renderJoinedLinks()
  tmsg("Sent")
}
async function acceptProposal(){
  if(!room||!room.offer||!room.proposal){tmsg("No proposal");return}
  if(!isCreator()){tmsg("Not yours");return}
  let tag="creator:"+room.id
  if(state.doneTrades.includes(tag)){tmsg("Done");return}
  let offerCats=(room.offer.cats||[]).map(cleanCat)
  let propCats=(room.proposal.cats||[]).map(cleanCat)
  let offerCurrency=safeNum(room.offer.currency)
  let propCurrency=safeNum(room.proposal.currency)
  if(offerCats.some(c=>!findCat(c.hash))||state.racao<offerCurrency){tmsg("Missing item");return}
  for(let c of offerCats)removeCat(c.hash)
  state.racao=Math.max(0,state.racao-offerCurrency)
  for(let c of propCats)addCat(Object.assign({},c,{got:todayKey(),trade:true}))
  state.racao+=propCurrency
  state.doneTrades.push(tag)
  let tr=state.createdTrades.find(t=>t.id===room.id)
  if(tr)tr.status="accepted"
  let acc={type:"accepted",id:room.id,fromUser:state.username,fromSid:state.sid,toUser:room.proposal.username,toSid:room.proposal.sid,ownerCats:offerCats,ownerCurrency:offerCurrency,replyCats:propCats,replyCurrency:propCurrency,t:Date.now()}
  room.accepted=acc
  livePut(room.id,"accepted",await lock(room.k,acc))
  saveProfile()
  render()
  renderRoom()
  tmsg("Accepted")
}
async function declineProposal(){
  if(!room||!room.proposal)return
  let dec={type:"declined",id:room.id,fromUser:state.username,fromSid:state.sid,toUser:room.proposal.username,toSid:room.proposal.sid,t:Date.now()}
  livePut(room.id,"declined",await lock(room.k,dec))
  let tr=state.createdTrades.find(t=>t.id===room.id)
  if(tr)tr.status="open"
  room.proposal=null
  saveProfile()
  renderTrade()
  tmsg("Declined")
}
async function cancelTrade(id){
  let t=state.createdTrades.find(x=>x.id===id)
  if(!t)return
  if(!confirm("Cancel?"))return
  livePut(id,"cancelled",await lock(t.k,{type:"cancelled",id,username:state.username,sid:state.sid,t:Date.now()}))
  t.status="cancelled"
  saveProfile()
  renderTrade()
  tmsg("Cancelled")
}
function handleAccepted(id,k,acc){
  if(!acc)return
  if(room&&room.id===id){room.accepted=acc;renderRoom()}
  if(acc.toSid!==state.sid&&acc.toUser!==state.username)return
  let tag="reply:"+id
  if(state.doneTrades.includes(tag))return
  let prop=state.joinedTrades.find(t=>t.id===id)
  let replyCats=(acc.replyCats||[]).map(cleanCat)
  let ownerCats=(acc.ownerCats||[]).map(cleanCat)
  for(let c of replyCats)removeCat(c.hash)
  state.racao=Math.max(0,state.racao-safeNum(acc.replyCurrency))
  for(let c of ownerCats)addCat(Object.assign({},c,{got:todayKey(),trade:true}))
  state.racao+=safeNum(acc.ownerCurrency)
  state.doneTrades.push(tag)
  if(prop)prop.status="accepted"
  saveProfile()
  render()
  tmsg("Claimed")
}
function bootWatches(){
  if(!root)return
  for(let t of state.createdTrades.concat(state.joinedTrades)){
    if(t.id&&t.k&&t.status!=="cancelled"&&t.status!=="accepted")startWatch(t.id,t.k)
  }
}
function goPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"))
  q("#"+name).classList.add("on")
  if(name==="trade")renderTrade()
}
function enterApp(){
  q("#gate").classList.remove("on")
  q("#app").style.display="block"
  goPage("home")
  render()
  bootWatches()
}
q("#nameInput").oninput=()=>{q("#nameInput").value=cleanUser(q("#nameInput").value)}
q("#setName").onclick=()=>{
  let n=cleanUser(q("#nameInput").value)
  if(n.length<3){q("#gateMsg").textContent="3 letters";return}
  state.username=n
  saveProfile()
  q("#gateMsg").textContent=""
  enterApp()
  openFromHash()
}
q("#grab").onclick=grab
q("#makeTrade").onclick=createTrade
q("#deleteAll").onclick=()=>{
  let x=prompt("Type RESET")
  if(x==="RESET"){
    let u=state.username,sid=state.sid
    state=freshState()
    state.username=u
    state.sid=sid
    saveProfile()
    render()
    msg("Reset")
  }
}
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>goPage(b.dataset.page))
document.body.addEventListener("click",e=>{
  let b=e.target.closest("[data-act]")
  if(!b)return
  let id=b.dataset.id
  let act=b.dataset.act
  if(act==="delete"){
    if(confirm("Delete?")){
      removeCat(b.dataset.h)
      saveProfile()
      render()
      msg("Deleted")
    }
  }
  if(act==="copyTrade"){
    let t=state.createdTrades.find(x=>x.id===id)
    if(t){copyText(t.short||t.link);tmsg("Copied")}
  }
  if(act==="openTrade"){
    let t=state.createdTrades.find(x=>x.id===id)
    if(t)openRoom(t.id,t.k,false)
  }
  if(act==="openJoined"){
    let t=state.joinedTrades.find(x=>x.id===id)
    if(t)openRoom(t.id,t.k,false)
  }
  if(act==="cancelTrade")cancelTrade(id)
  if(act==="sendProposal")sendProposal()
  if(act==="acceptProposal")acceptProposal()
  if(act==="declineProposal")declineProposal()
  if(act==="maxCurrency"){
    let x=q("#"+b.dataset.target)
    if(x)x.value=state.racao
  }
})
document.body.addEventListener("input",e=>{
  let x=e.target
  if(x.id==="offerCurrency"||x.id==="replyCurrency")capCurrency(x.id)
  if(x.dataset&&x.dataset.act==="rename"){
    let c=findCat(x.dataset.h)
    if(c){
      c.name=cleanCatName(x.value)
      x.value=c.name
      saveProfile()
    }
  }
})
window.addEventListener("hashchange",openFromHash)
async function init(){
  let s=loadProfile()
  state=normalizeState(s)
  if(state.username){
    enterApp()
    await openFromHash()
  }else{
    q("#app").style.display="none"
    q("#gate").classList.add("on")
  }
}
init()
})()
</script>
</body>
